<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 科學記憶永久宮殿 — 深度觀察者</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #a0a0a0;
            --accent-again: #ff5252;
            --accent-hard: #ffd740;
            --accent-good: #40c4ff;
            --accent-easy: #69f0ae;
            --border-color: #333333;
            --score-bg: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            padding: 76px 16px 12px 16px;
        }

        header {
            position: absolute;
            top: 16px;
            width: 100%;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .header-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 8px;
        }

        /* 自動生成下拉選單樣式 */
        .course-select {
            background: #1e1e1e;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px 28px 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            flex-grow: 1;
            max-width: 70%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='%23a0a0a0'><path d='M4 6l4 4 4-4z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 8px center;
        }
        .course-select:focus { border-color: var(--accent-good); }

        .reset-storage-btn {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .reset-storage-btn:hover { color: var(--accent-again); border-color: var(--accent-again); }

        .progress-container {
            flex-grow: 1;
            max-width: 70%;
            background: #2a2a2a;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-right: 12px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-good), var(--accent-easy));
            transition: width 0.3s ease;
        }

        .counter {
            font-size: 0.8rem;
            color: var(--text-sub);
            min-width: 50px;
            white-space: nowrap;
        }

        .status-tag {
            font-size: 0.72rem;
            color: #69f0ae;
            border: 1px solid #2a4a3a;
            padding: 3px 8px;
            border-radius: 12px;
            background: rgba(105, 240, 174, 0.05);
            white-space: nowrap;
        }

        #learning-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            flex-grow: 1;
            justify-content: center;
            gap: 12px;
            min-height: 0;
        }

        .stage {
            perspective: 1000px;
            width: 100%;
            max-width: 480px;
            height: 62vh; 
            max-height: 580px;
            min-height: 380px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .card-front {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .card-front .word {
            font-size: clamp(2.0rem, 7.5vw, 3.2rem);
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
            line-height: 1.2;
        }

        .card-front .hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.75rem;
            color: var(--text-sub);
            letter-spacing: 1px;
        }

        .card-back {
            transform: rotateY(180deg);
            display: flex !important;
            flex-direction: column !important;
            justify-content: flex-start;
            align-items: center;
            padding: 0 !important;
        }

        .card-image-bg {
            width: 100% !important;
            aspect-ratio: 16 / 9 !important;
            opacity: 1.0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            background-color: #0d0d0d;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .card-back-content {
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 16px 20px;
            text-align: left;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .card-back-content::-webkit-scrollbar { width: 4px; }
        .card-back-content::-webkit-scrollbar-track { background: transparent; }
        .card-back-content::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

        .word-meta {
            display: flex;
            align-items: baseline;
            margin-bottom: 2px;
            flex-wrap: wrap;
        }

        .word-title {
            font-size: clamp(1.4rem, 5vw, 2rem);
            font-weight: 700;
            margin-right: 8px;
            color: #ffffff;
        }

        .word-type {
            font-style: italic;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        .translation {
            font-size: 1.15rem;
            margin-bottom: 10px;
            color: var(--accent-good);
            font-weight: 600;
        }

        .section-title {
            font-size: 0.75rem;
            color: #ffb74d;
            margin-top: 6px;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
            font-weight: bold;
        }

        .section-text {
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 4px;
            padding-left: 4px;
            white-space: pre-line;
            line-height: 1.4;
        }

        .example-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 4px;
        }

        .mic-btn {
            background: #252525;
            border: 1px solid #444;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            outline: none;
            flex-shrink: 0;
        }
        
        .mic-btn svg { width: 14px; height: 14px; fill: #69f0ae; transition: fill 0.2s ease; }
        .mic-btn.recording { border-color: var(--accent-again); animation: pulse 1.2s infinite; }
        .mic-btn.recording svg { fill: var(--accent-again); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(255, 82, 82, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); }
        }

        .example-block {
            margin-top: 4px;
            border-left: 2px solid #555;
            padding-left: 10px;
            width: 100%;
        }

        .example-en { font-size: 0.9rem; color: var(--text-main); line-height: 1.4; word-break: break-word; }
        .example-ch { font-size: 0.8rem; color: var(--text-sub); margin-top: 2px; }

        .speech-feedback-panel {
            margin-top: 10px;
            background-color: var(--score-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 14px;
        }

        .feedback-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .score-display { font-size: 1.15rem; font-weight: 700; color: var(--accent-hard); }
        .score-display.perfect { color: var(--accent-easy); }
        .score-display.danger { color: var(--accent-again); }
        .feedback-label { font-size: 0.7rem; color: var(--text-sub); letter-spacing: 0.5px; }
        .user-transcript-box { font-size: 0.85rem; line-height: 1.35; color: var(--text-main); margin-bottom: 4px; }

        .word-correct { color: #69f0ae; margin-right: 4px; display: inline-block; }
        .word-error { color: #ff5252; text-decoration: underline dashed #ff5252; margin-right: 4px; display: inline-block; }
        .word-missed { color: #888888; text-decoration: line-through; margin-right: 4px; display: inline-block; }
        .ai-commentary { font-size: 0.75rem; color: var(--text-sub); font-style: italic; border-top: 1px solid #2a2a2a; padding-top: 4px; margin-top: 4px; }

        .controls {
            margin-top: 4px;
            display: flex;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            width: 100%;
            max-width: 480px;
            flex-shrink: 0;
            padding-bottom: 8px;
        }

        .controls.visible { opacity: 1; pointer-events: auto; }

        .btn {
            flex: 1;
            background: #222;
            border: 1px solid var(--border-color);
            padding: 10px 2px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .btn .num-tag { font-size: 0.65rem; opacity: 0.3; margin-top: 2px; }
        .btn:hover { background: #2b2b2b; }
        .btn-again:hover { border-color: var(--accent-again); color: var(--accent-again); }
        .btn-hard:hover { border-color: var(--accent-hard); color: var(--accent-hard); }
        .btn-good:hover { border-color: var(--accent-good); color: var(--accent-good); }
        .btn-easy:hover { border-color: var(--accent-easy); color: var(--accent-easy); }

        .message-screen { text-align: center; max-width: 100%; padding: 0 20px; margin-top: 80px; }
        .message-screen h2 { font-size: 1.6rem; margin-bottom: 12px; font-weight: 600; }
        .message-screen p { color: var(--text-sub); font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px; }
        .hidden { display: none !important; }
        
        .file-upload-btn {
            background: #222;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .file-upload-btn:hover { border-color: var(--accent-good); color: var(--accent-good); }
    </style>
</head>
<body>

    <header>
        <div class="header-top-row">
            <select class="course-select" id="course-selector" onchange="switchCourse(this.value)">
                <option value="">⏳ 正在解構雲端總目錄...</option>
            </select>
            <button class="reset-storage-btn" onclick="clearProgressData()">重置本課記憶</button>
        </div>
        <div class="header-bottom-row" style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <span class="counter" id="counter">0 / 0</span>
            <span class="status-tag" id="engine-status">讀取中</span>
        </div>
    </header>

    <div id="learning-stage">
        <div class="stage" id="card-stage">
            <div class="card" id="flashcard">
                <div class="card-face card-front">
                    <div class="word" id="front-word">等待選單初始化...</div>
                    <div class="hint">點擊卡片翻面</div>
                </div>
                <div class="card-face card-back">
                    <div class="card-image-bg" id="card-image"></div>
                    <div class="card-back-content">
                        <div class="word-meta">
                            <span class="word-title" id="back-word">-</span>
                            <span class="word-type" id="back-type">-</span>
                        </div>
                        <div class="translation" id="back-translation">-</div>
                        
                        <div class="section-title">【核心衍伸 / 結構解構】</div>
                        <div class="section-text" id="back-inflection">-</div>
                        
                        <div class="section-title">【專業搭配詞 / 語境連結】</div>
                        <div class="section-text" id="back-collocation">-</div>
                        
                        <div class="example-header">
                            <div class="section-title">【例句口說挑戰】</div>
                            <button class="mic-btn" id="mic-button" title="開始口說辨識">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="example-block">
                            <div class="example-en" id="back-example-en">-</div>
                            <div class="example-ch" id="back-example-ch">-</div>
                        </div>

                        <div class="speech-feedback-panel hidden" id="feedback-panel">
                            <div class="feedback-top">
                                <span class="feedback-label">AI 口說分析回饋</span>
                                <span class="score-display" id="score-text">0.0 / 10分</span>
                            </div>
                            <div class="user-transcript-box" id="visual-transcript"></div>
                            <div class="ai-commentary" id="ai-comment">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls" id="controls">
            <button class="btn btn-again" onclick="handleSRS('again')">Again<span class="num-tag">①</span></button>
            <button class="btn btn-hard" onclick="handleSRS('hard')">Hard<span class="num-tag">②</span></button>
            <button class="btn btn-good" onclick="handleSRS('good')">Good<span class="num-tag">③</span></button>
            <button class="btn btn-easy" onclick="handleSRS('easy')">Easy<span class="num-tag">④</span></button>
        </div>
    </div>

    <div id="completion-screen" class="message-screen hidden">
        <h2>思維沉澱，當前試算表已破關</h2>
        <p>此範疇之詞彙已悉數內化。點擊下方可重頭複習。</p>
        <button class="file-upload-btn" onclick="resetEngine()">重頭學習</button>
    </div>

    <script>
        // 💡 【核心重構】：填入你的「課程總目錄」試算表發布的 CSV 網址
        const MASTER_INDEX_URL = "https://docs.google.com/spreadsheets/d/1Tz4x82TbVcB-H9rzbxf9-26HSI1cGN9iKpiRrT2kmZo/export?format=csv";

        let COURSES_MAP = {}; // 儲存從總目錄解析出的 { 索引編號: CSV網址 }
        let originalCards = [];
        let queue = [];
        let currentCard = null;
        let isFlipped = false;
        let currentCourseKey = "";
        
        const synth = window.speechSynthesis;
        let recognition = null;
        let isRecording = false;

        try {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = 'en-US';
                recognition.onstart = () => { isRecording = true; document.getElementById('mic-button').classList.add('recording'); };
                recognition.onend = () => { isRecording = false; document.getElementById('mic-button').classList.remove('recording'); };
                recognition.onresult = (event) => { evaluateSpeech(event.results[0][0].transcript); };
                recognition.onerror = () => { isRecording = false; document.getElementById('mic-button').classList.remove('recording'); };
            }
        } catch (e) { console.error(e); }

        const learningStage = document.getElementById('learning-stage');
        const completionScreen = document.getElementById('completion-screen');
        const flashcard = document.getElementById('flashcard');
        const controls = document.getElementById('controls');
        const progressBar = document.getElementById('progress-bar');
        const counter = document.getElementById('counter');
        const statusTag = document.getElementById('engine-status');

        document.getElementById('card-stage').addEventListener('click', (e) => {
            if (e.target.closest('#mic-button')) return;
            flipCard();
        });

        document.getElementById('mic-button').addEventListener('click', (e) => {
            e.stopPropagation();
            if (!recognition) { alert("此環境暫不支援語音功能。"); return; }
            if (isRecording) { recognition.stop(); } 
            else { try { synth.cancel(); recognition.start(); } catch(err) {} }
        });

        document.addEventListener('keydown', (e) => {
            if (queue.length === 0) return;
            if (e.code === 'Space') { e.preventDefault(); flipCard(); } 
            else if (isFlipped && !isRecording) {
                if (e.key === '1') handleSRS('again');
                if (e.key === '2') handleSRS('hard');
                if (e.key === '3') handleSRS('good');
                if (e.key === '4') handleSRS('easy');
            }
        });

        // 啟動點：先抓總目錄，再加載課程
        window.addEventListener('DOMContentLoaded', () => {
            fetchMasterIndex();
        });

        // 1. 抓取總目錄試算表並動態渲染下拉選單
        function fetchMasterIndex() {
            statusTag.textContent = "解構選單...";
            fetch(MASTER_INDEX_URL)
                .then(res => {
                    if(!res.ok) throw new Error("總目錄讀取失敗");
                    return res.text();
                })
                .then(csvText => {
                    const rows = csvToObjects(csvText);
                    const selector = document.getElementById('course-selector');
                    selector.innerHTML = ''; // 清空加載字樣

                    if(rows.length === 0) {
                        selector.innerHTML = '<option>⚠️ 總目錄無資料</option>';
                        return;
                    }

                    COURSES_MAP = {};
                    rows.forEach((row, index) => {
                        if(row.course_name && row.csv_url) {
                            const key = `course_${index}`;
                            COURSES_MAP[key] = row.csv_url.trim();

                            const opt = document.createElement('option');
                            opt.value = key;
                            opt.textContent = row.course_name.trim();
                            selector.appendChild(opt);
                        }
                    });

                    // 讀取上次離開時的課程紀錄
                    const savedKey = localStorage.getItem('observer_current_sheet_key');
                    if (savedKey && COURSES_MAP[savedKey]) {
                        currentCourseKey = savedKey;
                        selector.value = savedKey;
                    } else {
                        currentCourseKey = Object.keys(COURSES_MAP)[0];
                    }

                    loadCourseData(currentCourseKey);
                })
                .catch(err => {
                    console.error(err);
                    statusTag.textContent = "配置出錯";
                    document.getElementById('front-word').textContent = "無法載入總目錄，請確認 MASTER_INDEX_URL 是否配置正確";
                });
        }

        function switchCourse(courseKey) {
            if(!courseKey || !COURSES_MAP[courseKey]) return;
            synth.cancel();
            if (isRecording && recognition) recognition.stop();
            
            currentCourseKey = courseKey;
            localStorage.setItem('observer_current_sheet_key', courseKey);
            loadCourseData(courseKey);
        }

        // 2. 依據選單切換結果，動態二級抓取特定的課程字卡
        function loadCourseData(courseKey) {
            const targetUrl = COURSES_MAP[courseKey];
            if(!targetUrl) return;

            statusTag.textContent = "讀取課程...";
            statusTag.style.color = "#ffd740";

            fetch(targetUrl)
                .then(response => {
                    if (!response.ok) throw new Error("無法下載此課程內容");
                    return response.text();
                })
                .then(csvText => {
                    originalCards = csvToObjects(csvText);
                    
                    if(originalCards.length === 0) throw new Error("課程內容為空");

                    // 記憶排程隔離：以網址雜湊作為各自獨立的記憶鎖
                    const urlHash = btoa(targetUrl).substring(0, 16);
                    const cacheKey = `observer_srs_queue_sheet_${urlHash}`;
                    const cachedQueue = localStorage.getItem(cacheKey);

                    if (cachedQueue) {
                        queue = JSON.parse(cachedQueue);
                        queue = queue.filter(qCard => originalCards.some(oCard => oCard.word === qCard.word));
                        if(queue.length === 0) queue = [...originalCards];
                    } else {
                        queue = [...originalCards];
                    }

                    statusTag.textContent = "雲端已同步";
                    statusTag.style.color = "#69f0ae";

                    if (queue.length === 0) {
                        showCompletion();
                    } else {
                        learningStage.style.display = 'flex';
                        completionScreen.classList.add('hidden');
                        updateProgress();
                        showNextCard();
                    }
                })
                .catch(err => {
                    console.error(err);
                    statusTag.textContent = "加載失敗";
                    statusTag.style.color = "#ff5252";
                    document.getElementById('front-word').textContent = "此課程連線失敗，請檢查該子試算表發布狀態";
                });
        }

        // CSV 自建剖析轉物件函數 (維持原封不動的高安全隔離)
        function csvToObjects(csv) {
            const lines = csv.split(/\r?\n/).filter(line => line.trim() !== "");
            if (lines.length < 2) return [];
            const headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase());
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                if (values.length === 0) continue;
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index] ? values[index].trim() : "";
                });
                result.push(obj);
            }
            return result;
        }

        function parseCSVLine(line) {
            const arr = []; let quote = false; let col = "";
            for (let c = 0; c < line.length; c++) {
                let char = line[c];
                if (char === '"') {
                    if (quote && line[c+1] === '"') { col += '"'; c++; }
                    else { quote = !quote; }
                } else if (char === ',' && !quote) { arr.push(col); col = ""; } 
                else { col += char; }
            }
            arr.push(col); return arr;
        }

        function showNextCard() {
            if (queue.length === 0) { showCompletion(); return; }
            isFlipped = false;
            flashcard.classList.remove('flipped');
            controls.classList.remove('visible');
            document.getElementById('feedback-panel').classList.add('hidden');

            currentCard = queue[0];
            document.getElementById('front-word').textContent = currentCard.word;
            document.getElementById('back-word').textContent = currentCard.word;
            document.getElementById('back-type').textContent = currentCard.type || '';
            document.getElementById('back-translation').textContent = currentCard.translation || '';
            document.getElementById('back-inflection').textContent = currentCard.inflection || '無';
            document.getElementById('back-collocation').textContent = currentCard.collocation || '無';
            document.getElementById('back-example-en').textContent = currentCard.example_en || '';
            document.getElementById('back-example-ch').textContent = currentCard.example_ch || '';

            document.querySelector('.card-back-content').scrollTop = 0;
            updateCardImage(currentCard.word);
            if (queue[1]) preloadImage(queue[1].word);
        }

        function flipCard() {
            if (isFlipped || !currentCard) return;
            isFlipped = true;
            flashcard.classList.add('flipped');
            controls.classList.add('visible');
            speakCard();
        }

        function speakCard() {
            if(!currentCard.word) return;
            synth.cancel();
            const utterWord1 = new SpeechSynthesisUtterance(currentCard.word);
            utterWord1.lang = 'en-US'; utterWord1.rate = 0.9;
            const utterWord2 = new SpeechSynthesisUtterance(currentCard.word);
            utterWord2.lang = 'en-US'; utterWord2.rate = 0.82;
            synth.speak(utterWord1); synth.speak(utterWord2);
            if(currentCard.example_en) {
                const utterExample = new SpeechSynthesisUtterance(currentCard.example_en);
                utterExample.lang = 'en-US'; utterExample.rate = 0.95;
                synth.speak(utterExample);
            }
        }

        function handleSRS(level) {
            if (!isFlipped || isRecording) return;
            const card = queue.shift();

            if (level === 'again') {
                queue.splice(1, 0, card);
            } else if (level === 'hard') {
                const index = Math.max(2, Math.floor(queue.length / 3));
                queue.splice(index, 0, card);
            } else if (level === 'good') {
                const index = Math.max(1, Math.floor(queue.length * 0.8));
                queue.splice(index, 0, card);
            }

            const targetUrl = COURSES_MAP[currentCourseKey];
            const urlHash = btoa(targetUrl).substring(0, 16);
            const cacheKey = `observer_srs_queue_sheet_${urlHash}`;
            localStorage.setItem(cacheKey, JSON.stringify(queue));
            updateProgress();
            showNextCard();
        }

        function updateProgress() {
            const total = originalCards.length;
            const currentLeft = queue.length;
            const done = total - currentLeft;
            progressBar.style.width = `${total > 0 ? (done / total) * 100 : 0}%`;
            counter.textContent = `${currentLeft} / ${total}`;
        }

        function showCompletion() {
            learningStage.style.display = 'none';
            completionScreen.classList.remove('hidden');
            const targetUrl = COURSES_MAP[currentCourseKey];
            const urlHash = btoa(targetUrl).substring(0, 16);
            localStorage.removeItem(`observer_srs_queue_sheet_${urlHash}`);
        }

        function resetEngine() {
            queue = [...originalCards];
            const targetUrl = COURSES_MAP[currentCourseKey];
            const urlHash = btoa(targetUrl).substring(0, 16);
            localStorage.setItem(`observer_srs_queue_sheet_${urlHash}`, JSON.stringify(queue));
            completionScreen.classList.add('hidden');
            learningStage.style.display = 'flex';
            updateProgress();
            showNextCard();
        }

        function clearProgressData() {
            if(!currentCourseKey) return;
            if(confirm("確定要將當前課程的記憶排程全部歸零重置嗎？")) {
                const targetUrl = COURSES_MAP[currentCourseKey];
                const urlHash = btoa(targetUrl).substring(0, 16);
                localStorage.removeItem(`observer_srs_queue_sheet_${urlHash}`);
                loadCourseData(currentCourseKey);
            }
        }

        function evaluateSpeech(userText) {
            if(!currentCard.example_en) return;
            const cleanText = (str) => str.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g,"").split(/\s+/).filter(Boolean);
            const targetWords = cleanText(currentCard.example_en);
            const userWords = cleanText(userText);
            let score = 10.0; const perWordValue = 10.0 / targetWords.length;
            const feedbackContainer = document.getElementById('visual-transcript');
            feedbackContainer.innerHTML = '';
            
            let isSemanticInverted = false;
            const negativeParticles = ['no', 'not', 'dont', 'doesnt', 'didnt', 'cant', 'wont', 'never'];
            if (targetWords.some(w => negativeParticles.includes(w)) !== userWords.some(w => negativeParticles.includes(w))) isSemanticInverted = true;
            
            let htmlOutput = []; let userIdx = 0;
            for (let i = 0; i < targetWords.length; i++) {
                const target = targetWords[i]; const user = userWords[userIdx];
                if (!user) { htmlOutput.push(`<span class="word-missed">${target}</span>`); score -= perWordValue; continue; }
                if (target === user) { htmlOutput.push(`<span class="word-correct">${target}</span>`); userIdx++; } 
                else {
                    const diffRatio = levenshteinDistance(target, user) / Math.max(target.length, user.length);
                    if (diffRatio <= 0.35) { htmlOutput.push(`<span class="word-correct" style="color:#ffd740; text-decoration: underline dotted;">${user}</span>`); score -= (perWordValue * 0.5); } 
                    else { htmlOutput.push(`<span class="word-error" title="預期: ${target}">${user}</span>`); score -= perWordValue; }
                    userIdx++;
                }
            }
            while(userIdx < userWords.length) { htmlOutput.push(`<span class="word-error" style="opacity: 0.6;" title="贅字">${userWords[userIdx]}</span>`); score -= (perWordValue * 0.3); userIdx++; }
            
            if (isSemanticInverted) { 
                score -= 3.5; 
                document.getElementById('score-text').className = "score-display danger"; 
                document.getElementById('ai-comment').innerHTML = "⚠️ <span style='color:#ff5252; font-weight:bold;'>語意反轉失誤！</span>"; 
            } else {
                score = Math.max(0, Math.min(10, score));
                const scoreTextEl = document.getElementById('score-text'); const aiCommentEl = document.getElementById('ai-comment');
                if (score >= 9.0) { scoreTextEl.className = "score-display perfect"; aiCommentEl.textContent = "Excellent! 發音極其清晰。"; } 
                else if (score >= 7.5) { scoreTextEl.className = "score-display"; aiCommentEl.textContent = "Good job! 帶有些微口音，不影響溝通。"; } 
                else { scoreTextEl.className = "score-display danger"; aiCommentEl.textContent = "關鍵字偏離，可能造成誤解。"; }
            }
            document.getElementById('score-text').textContent = `${score.toFixed(1)} / 10分`;
            feedbackContainer.innerHTML = htmlOutput.join('');
            document.getElementById('feedback-panel').classList.remove('hidden');
            
            setTimeout(() => {
                const contentArea = document.querySelector('.card-back-content');
                contentArea.scrollTo({ top: contentArea.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        function levenshteinDistance(s1, s2) {
            const track = Array(s2.length + 1).fill(null).map(() => Array(s1.length + 1).fill(null));
            for (let i = 0; i <= s1.length; i += 1) track[0][i] = i; for (let j = 0; j <= s2.length; j += 1) track[j][0] = j;
            for (let j = 1; j <= s2.length; j += 1) { for (let i = 1; i <= s1.length; i += 1) { const indicator = s1[i - 1] === s2[j - 1] ? 0 : 1; track[j][i] = Math.min(track[j][i - 1] + 1, track[j - 1][i] + 1, track[j - 1][i - 1] + indicator); } }
            return track[s2.length][s1.length];
        }

        function updateCardImage(word) {
            if(!word) return;
            const localSrc = `./${word.toLowerCase().replace(/\s+/g, '_')}.jpg`;
            document.getElementById('card-image').style.backgroundImage = `url('${localSrc}')`;
        }

        function preloadImage(word) {
            if(!word) return;
            const img = new Image();
            img.src = `./${word.toLowerCase().replace(/\s+/g, '_')}.jpg`;
        }
    </script>
