<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 科學記憶永久宮殿 — 深度觀察者</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #a0a0a0;
            --accent-again: #ff5252;
            --accent-hard: #ffd740;
            --accent-good: #40c4ff;
            --accent-easy: #69f0ae;
            --border-color: #333333;
            --score-bg: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow: hidden;
            padding-top: 90px;
        }

        header {
            position: absolute;
            top: 25px;
            width: 100%;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .progress-container {
            flex-grow: 1;
            max-width: 350px;
            background: #2a2a2a;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-right: 20px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-good), var(--accent-easy));
            transition: width 0.3s ease;
        }

        .counter { font-size: 0.85rem; color: var(--text-sub); min-width: 60px; }

        .btn-group { display: flex; gap: 10px; align-items: center; }

        .action-btn {
            background: transparent;
            border: 1px solid #444;
            color: var(--text-sub);
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s ease;
        }
        .action-btn:hover { color: var(--text-main); border-color: var(--text-sub); }
        .btn-export:hover { color: var(--accent-easy); border-color: var(--accent-easy); }

        .stage { perspective: 1000px; width: 95%; max-width: 620px; height: 730px; cursor: pointer; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }

        .card-front { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        .card-front .word { font-size: 3.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .card-front .hint { position: absolute; bottom: 25px; font-size: 0.8rem; color: var(--text-sub); letter-spacing: 1px; }

        .card-back { transform: rotateY(180deg); display: flex !important; flex-direction: column !important; justify-content: flex-start; align-items: center; padding: 0 !important; }
        .card-image-bg { width: 100% !important; aspect-ratio: 16 / 9 !important; opacity: 1.0; background-size: contain; background-repeat: no-repeat; background-position: center; pointer-events: none; background-color: #0d0d0d; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }

        .card-back-content { width: 100%; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; padding: 24px 30px; text-align: left; overflow-y: auto; }
        .card-back-content::-webkit-scrollbar { width: 6px; }
        .card-back-content::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        .word-meta { display: flex; align-items: baseline; margin-bottom: 2px; }
        .word-title { font-size: 2.2rem; font-weight: 700; margin-right: 10px; color: #ffffff; }
        .word-type { font-style: italic; color: var(--text-sub); font-size: 1rem; }
        .translation { font-size: 1.3rem; margin-bottom: 14px; color: var(--accent-good); font-weight: 600; }

        .section-title { font-size: 0.8rem; color: #ffb74d; margin-top: 8px; margin-bottom: 2px; letter-spacing: 0.5px; font-weight: bold; }
        .section-text { font-size: 0.95rem; color: var(--text-main); margin-bottom: 6px; padding-left: 4px; white-space: pre-line; line-height: 1.45; }

        .example-header { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
        .mic-btn { background: #252525; border: 1px solid #444; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; outline: none; }
        .mic-btn svg { width: 16px; height: 16px; fill: #69f0ae; }
        .mic-btn.recording { border-color: var(--accent-again); animation: pulse 1.2s infinite; }
        .mic-btn.recording svg { fill: var(--accent-again); }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 82, 82, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); } }

        .example-block { margin-top: 6px; border-left: 2px solid #555; padding-left: 12px; width: 100%; }
        .example-en { font-size: 0.95rem; color: var(--text-main); line-height: 1.45; word-break: break-word; }
        .example-ch { font-size: 0.85rem; color: var(--text-sub); margin-top: 4px; }

        .speech-feedback-panel { margin-top: 14px; background-color: var(--score-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px 16px; }
        .feedback-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .score-display { font-size: 1.3rem; font-weight: 700; color: var(--accent-hard); }
        .score-display.perfect { color: var(--accent-easy); }
        .score-display.danger { color: var(--accent-again); }
        .feedback-label { font-size: 0.75rem; color: var(--text-sub); letter-spacing: 0.5px; }
        .user-transcript-box { font-size: 0.9rem; line-height: 1.4; color: var(--text-main); margin-bottom: 6px; }

        .word-correct { color: #69f0ae; margin-right: 4px; display: inline-block; }
        .word-error { color: #ff5252; text-decoration: underline dashed #ff5252; margin-right: 4px; display: inline-block; }
        .word-missed { color: #888888; text-decoration: line-through; margin-right: 4px; display: inline-block; }
        .ai-commentary { font-size: 0.8rem; color: var(--text-sub); font-style: italic; border-top: 1px solid #2a2a2a; padding-top: 6px; margin-top: 4px; }

        .controls { margin-top: 20px; display: flex; gap: 15px; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; width: 100%; max-width: 620px; flex-shrink: 0; }
        .controls.visible { opacity: 1; pointer-events: auto; }

        .btn { flex: 1; background: #222; border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-main); font-weight: 500; transition: all 0.2s ease; }
        .btn .num-tag { font-size: 0.7rem; opacity: 0.4; margin-top: 4px; }
        .btn:hover { background: #2b2b2b; }
        .btn-again:hover { border-color: var(--accent-again); color: var(--accent-again); }
        .btn-hard:hover { border-color: var(--accent-hard); color: var(--accent-hard); }
        .btn-good:hover { border-color: var(--accent-good); color: var(--accent-good); }
        .btn-easy:hover { border-color: var(--accent-easy); color: var(--accent-easy); }

        .message-screen { text-align: center; max-width: 450px; margin-top: 100px; }
        .message-screen h2 { font-size: 2rem; margin-bottom: 16px; font-weight: 600; }
        .message-screen p { color: var(--text-sub); font-size: 0.95rem; line-height: 1.6; margin-bottom: 24px; }
        .hidden { display: none !important; }
        
        #hidden-file-input { display: none; }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center;">
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <span class="counter" id="counter">0 / 0</span>
        </div>
        <div class="btn-group">
            <button class="action-btn btn-export" onclick="exportProgressCSV()" title="將目前的記憶進度打包成試算表帶走">導出進度</button>
            <label class="action-btn" title="在新電腦上導入帶有進度的試算表">
                導入進度
                <input type="file" id="hidden-file-input" accept=".csv" onchange="importProgressCSV(event)">
            </label>
            <button class="action-btn" onclick="clearProgressData()" style="color:#ff5252;" title="歸零重洗">重置</button>
        </div>
    </header>

    <div id="learning-stage" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div class="stage" id="card-stage">
            <div class="card" id="flashcard">
                <div class="card-face card-front">
                    <div class="word" id="front-word">-</div>
                    <div class="hint">SPACE 或 點擊卡片翻面</div>
                </div>
                <div class="card-face card-back">
                    <div class="card-image-bg" id="card-image"></div>
                    <div class="card-back-content">
                        <div class="word-meta">
                            <span class="word-title" id="back-word">-</span>
                            <span class="word-type" id="back-type">-</span>
                        </div>
                        <div class="translation" id="back-translation">-</div>
                        
                        <div class="section-title">【詞性變化】</div>
                        <div class="section-text" id="back-inflection">-</div>
                        
                        <div class="section-title">【搭配詞】</div>
                        <div class="section-text" id="back-collocation">-</div>
                        
                        <div class="example-header">
                            <div class="section-title">【例句口說挑戰】</div>
                            <button class="mic-btn" id="mic-button" title="開始口說辨識">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="example-block">
                            <div class="example-en" id="back-example-en">-</div>
                            <div class="example-ch" id="back-example-ch">-</div>
                        </div>

                        <div class="speech-feedback-panel hidden" id="feedback-panel">
                            <div class="feedback-top">
                                <span class="feedback-label">AI 口說分析回饋</span>
                                <span class="score-display" id="score-text">0.0 / 10分</span>
                            </div>
                            <div class="user-transcript-box" id="visual-transcript"></div>
                            <div class="ai-commentary" id="ai-comment">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls" id="controls">
            <button class="btn btn-again" onclick="handleSRS('again')">Again<span class="num-tag">①</span></button>
            <button class="btn btn-hard" onclick="handleSRS('hard')">Hard<span class="num-tag">②</span></button>
            <button class="btn btn-good" onclick="handleSRS('good')">Good<span class="num-tag">③</span></button>
            <button class="btn btn-easy" onclick="handleSRS('easy')">Easy<span class="num-tag">④</span></button>
        </div>
    </div>

    <div id="completion-screen" class="message-screen hidden">
        <h2>思維沉澱，破關完成</h2>
        <p>這批內嵌數據庫已全部完成階段內化。</p>
        <button class="file-upload-btn" onclick="resetEngine()">重頭學習</button>
    </div>

    <script>
        // 💡 【大腦矩陣】：將試算表內容與進度核心數據（historyCount）完全寫死在一起，合而為一
        const STATIC_VOCABULARY_DATABASE = [
            { word: "ability", type: "n.", translation: "能力；才能", inflection: "able (adj.) 能夠的", collocation: "have the ability to 具有…的能力", example_en: "He has the ability to look deep into the truth.", example_ch: "他有深入洞察真相的能力。", historyCount: 0 },
            { word: "appear", type: "v.", translation: "出現；顯露", inflection: "appearance (n.) 外貌；出現", collocation: "appear in public 公開露面", example_en: "A mysterious black box suddenly appeared in the room.", example_ch: "一個神祕的黑盒子突然出現在房間裡。", historyCount: 0 },
            { word: "arrive", type: "v.", translation: "到達；抵達", inflection: "arrival (n.) 到達；抵達", collocation: "arrive at the airport 到達機場\narrive in London 到達倫敦", example_en: "We arrived at the hotel very late at night.", example_ch: "我們在深夜很晚才到達飯店。", historyCount: 0 },
            { word: "beautiful", type: "adj.", translation: "美麗的", inflection: "beautify (v.) 美化", collocation: "a beautiful scene 美麗的畫面", example_en: "The 16-bit retro style has a beautiful view.", example_ch: "16-bit 復古風格有著美麗的景致。", historyCount: 0 },
            { word: "correct", type: "adj.", translation: "正確的", inflection: "correction (n.) 修改；糾正", collocation: "correct answer 正確答案", example_en: "Please ensure the diagnostic data is correct.", example_ch: "請確保診斷數據是正確的。", historyCount: 0 },
            { word: "define", type: "v.", translation: "定義；界定", inflection: "definition (n.) 定義", collocation: "define the rules 定義規則", example_en: "We must define the new protocols for the system.", example_ch: "我們必須為系統定義新的協定。", historyCount: 0 },
            { word: "different", type: "adj.", translation: "不同的", inflection: "difference (n.) 差異；不同", collocation: "be different from 與…不同", example_en: "They hold two entirely different views.", example_ch: "他們持有兩種截然不同的觀點。", historyCount: 0 },
            { word: "example", type: "n.", translation: "例子；典範", inflection: "exemplify (v.) 作為…的例子", collocation: "for example 例如", example_en: "This application is a classic example of vibe coding.", example_ch: "這個應用程式是 Vibe Coding 的經典範例。", historyCount: 0 }
        ];

        let originalCards = JSON.parse(JSON.stringify(STATIC_VOCABULARY_DATABASE));
        let queue = [];
        let currentCard = null;
        let isFlipped = false;
        
        const synth = window.speechSynthesis;
        let recognition = null;
        let isRecording = false;

        try {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = false; recognition.interimResults = false; recognition.lang = 'en-US';
                recognition.onstart = () => { isRecording = true; document.getElementById('mic-button').classList.add('recording'); };
                recognition.onend = () => { isRecording = false; document.getElementById('mic-button').classList.remove('recording'); };
                recognition.onresult = (event) => { evaluateSpeech(event.results[0][0].transcript); };
                recognition.onerror = () => { isRecording = false; document.getElementById('mic-button').classList.remove('recording'); };
            }
        } catch (e) { console.error(e); }

        const learningStage = document.getElementById('learning-stage');
        const completionScreen = document.getElementById('completion-screen');
        const flashcard = document.getElementById('flashcard');
        const controls = document.getElementById('controls');
        const progressBar = document.getElementById('progress-bar');
        const counter = document.getElementById('counter');

        window.addEventListener('DOMContentLoaded', () => { initEngineWithCache(); });

        function initEngineWithCache() {
            const cachedQueue = localStorage.getItem('embedded_srs_queue');
            const cachedOriginal = localStorage.getItem('embedded_srs_original');
            
            if (cachedQueue && cachedOriginal) {
                queue = JSON.parse(cachedQueue);
                originalCards = JSON.parse(cachedOriginal);
            } else {
                originalCards = JSON.parse(JSON.stringify(STATIC_VOCABULARY_DATABASE));
                queue = [...originalCards];
            }
            
            if (queue.length === 0) { showCompletion(); } 
            else {
                learningStage.classList.remove('hidden');
                completionScreen.classList.add('hidden');
                updateProgress();
                showNextCard();
            }
        }

        function showNextCard() {
            if (queue.length === 0) { showCompletion(); return; }
            isFlipped = false; flashcard.classList.remove('flipped'); controls.classList.remove('visible');
            document.getElementById('feedback-panel').classList.add('hidden');

            currentCard = queue[0];
            document.getElementById('front-word').textContent = currentCard.word;
            document.getElementById('back-word').textContent = currentCard.word;
            document.getElementById('back-type').textContent = currentCard.type;
            document.getElementById('back-translation').textContent = currentCard.translation;
            document.getElementById('back-inflection').textContent = currentCard.inflection;
            document.getElementById('back-collocation').textContent = currentCard.collocation;
            document.getElementById('back-example-en').textContent = currentCard.example_en;
            document.getElementById('back-example-ch').textContent = currentCard.example_ch;

            document.querySelector('.card-back-content').scrollTop = 0;
            updateCardImage(currentCard.word);
        }

        function flipCard() {
            if (isFlipped || !currentCard) return;
            isFlipped = true; flashcard.classList.add('flipped'); controls.classList.add('visible');
            speakCard();
        }

        function speakCard() {
            synth.cancel(); 
            const utterWord1 = new SpeechSynthesisUtterance(currentCard.word); utterWord1.lang = 'en-US'; utterWord1.rate = 0.9;
            const utterExample = new SpeechSynthesisUtterance(currentCard.example_en); utterExample.lang = 'en-US'; utterExample.rate = 0.95;
            synth.speak(utterWord1); synth.speak(utterExample);
        }

        function handleSRS(level) {
            if (!isFlipped || isRecording) return;
            const card = queue.shift(); 

            // 調整寫在程式碼裡的試算表數據欄位值
            if (level === 'again') { card.historyCount += 1; queue.splice(1, 0, card); } 
            else if (level === 'hard') { card.historyCount += 0.5; const idx = Math.max(2, Math.floor(queue.length / 3)); queue.splice(idx, 0, card); } 
            else if (level === 'good') { card.historyCount -= 0.2; const idx = Math.max(1, Math.floor(queue.length * 0.8)); queue.splice(idx, 0, card); } 
            else if (level === 'easy') {
                // 從佇列移除，並更新主庫對應單字的永久狀態
                const master = originalCards.find(c => c.word === card.word);
                if(master) master.historyCount = 99; 
            }

            localStorage.setItem('embedded_srs_queue', JSON.stringify(queue));
            localStorage.setItem('embedded_srs_original', JSON.stringify(originalCards));

            updateProgress();
            showNextCard();
        }

        // 💡 【跨裝置橋樑一】：導出當下的進度試算表 (CSV)
        function exportProgressCSV() {
            let csvContent = "\uFEFFword,type,translation,inflection,collocation,example_en,example_ch,historyCount\n";
            originalCards.forEach(c => {
                let row = [c.word, c.type, c.translation, c.inflection, c.collocation.replace(/\n/g, '\\n'), c.example_en, c.example_ch, c.historyCount];
                let escapedRow = row.map(v => `"${String(v).replace(/"/g, '""')}"`);
                csvContent += escapedRow.join(",") + "\n";
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `srs_progress_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 💡 【跨裝置橋樑二】：在新電腦上，直接導入含有進度的試算表，覆蓋原生代碼進度
        function importProgressCSV(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                const lines = evt.target.result.replace(/\r/g, '').split('\n');
                let importedOriginal = [];
                for (let i = 1; i < lines.length; i++) {
                    let line = lines[i].trim(); if (!line) continue;
                    let row = [], inQuotes = false, currentField = '';
                    for (let j = 0; j < line.length; j++) {
                        let char = line[j];
                        if (char === '"') inQuotes = !inQuotes;
                        else if (char === ',' && !inQuotes) { row.push(currentField.trim()); currentField = ''; }
                        else currentField += char;
                    }
                    row.push(currentField.trim());
                    if (row.length >= 8) {
                        importedOriginal.push({
                            word: row[0], type: row[1], translation: row[2], inflection: row[3],
                            collocation: row[4].replace(/\\n/g, '\n'), example_en: row[5], example_ch: row[6],
                            historyCount: parseFloat(row[7]) || 0
                        });
                    }
                }
                if(importedOriginal.length > 0) {
                    originalCards = importedOriginal;
                    queue = originalCards.filter(c => c.historyCount < 99); // 過濾掉已經 Easy (99) 的字卡
                    localStorage.setItem('embedded_srs_queue', JSON.stringify(queue));
                    localStorage.setItem('embedded_srs_original', JSON.stringify(originalCards));
                    alert("成功對接進度！記憶已同步。");
                    initEngineWithCache();
                }
            };
            reader.readAsText(file, 'UTF-8');
        }

        function updateProgress() {
            const total = originalCards.length;
            const currentLeft = queue.length;
            progressBar.style.width = `${total > 0 ? ((total - currentLeft) / total) * 100 : 0}%`;
            counter.textContent = `${currentLeft} / ${total}`;
        }

        function showCompletion() { learningStage.classList.add('hidden'); completionScreen.classList.remove('hidden'); localStorage.removeItem('embedded_srs_queue'); }
        function resetEngine() { localStorage.removeItem('embedded_srs_queue'); localStorage.removeItem('embedded_srs_original'); initEngineWithCache(); }
        function clearProgressData() { if(confirm("重置將抹去本機所有記憶軌跡，重新洗牌？")) { resetEngine(); } }
        function updateCardImage(word) { document.getElementById('card-image').style.backgroundImage = `url('./${word.toLowerCase()}.jpg')`; }

        // 口說智評模組
        function evaluateSpeech(userText) {
            const cleanText = (str) => str.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g,"").split(/\s+/).filter(Boolean);
            const targetWords = cleanText(currentCard.example_en); const userWords = cleanText(userText);
            let score = 10.0; const perWordValue = 10.0 / targetWords.length;
            const feedbackContainer = document.getElementById('visual-transcript'); feedbackContainer.innerHTML = '';
            let isSemanticInverted = false; const negativeParticles = ['no', 'not', 'dont', 'doesnt', 'didnt', 'cant', 'wont', 'never'];
            if (targetWords.some(w => negativeParticles.includes(w)) !== userWords.some(w => negativeParticles.includes(w))) isSemanticInverted = true;
            let htmlOutput = []; let userIdx = 0;
            for (let i = 0; i < targetWords.length; i++) {
                const target = targetWords[i]; const user = userWords[userIdx];
                if (!user) { htmlOutput.push(`<span class="word-missed">${target}</span>`); score -= perWordValue; continue; }
                if (target === user) { htmlOutput.push(`<span class="word-correct">${target}</span>`); userIdx++; } 
                else {
                    const diffRatio = levenshteinDistance(target, user) / Math.max(target.length, user.length);
                    if (diffRatio <= 0.35) { htmlOutput.push(`<span class="word-correct" style="color:#ffd740; text-decoration: underline dotted;">${user}</span>`); score -= (perWordValue * 0.5); } 
                    else { htmlOutput.push(`<span class="word-error" title="預期: ${target}">${user}</span>`); score -= perWordValue; }
                    userIdx++;
                }
            }
            if (isSemanticInverted) { score -= 3.5; document.getElementById('score-text').className = "score-display danger"; document.getElementById('ai-comment').innerHTML = "⚠️ <span style='color:#ff5252; font-weight:bold;'>語意反轉失誤！</span>"; } 
            else {
                score = Math.max(0, Math.min(10, score));
                const scoreTextEl = document.getElementById('score-text'); const aiCommentEl = document.getElementById('ai-comment');
                if (score >= 9.0) { scoreTextEl.className = "score-display perfect"; aiCommentEl.textContent = "Excellent! 發音極其清晰。"; } 
                else if (score >= 7.5) { scoreTextEl.className = "score-display"; aiCommentEl.textContent = "Good job! 帶有些微口音。"; } 
                else { scoreTextEl.className = "score-display danger"; aiCommentEl.textContent = "部分關鍵字偏離。"; }
            }
            document.getElementById('score-text').textContent = `${score.toFixed(1)} / 10分`;
            feedbackContainer.innerHTML = htmlOutput.join(''); document.getElementById('feedback-panel').classList.remove('hidden'); document.querySelector('.card-back-content').scrollTop = 300;
        }

        function levenshteinDistance(s1, s2) {
            const track = Array(s2.length + 1).fill(null).map(() => Array(s1.length + 1).fill(null));
            for (let i = 0; i <= s1.length; i += 1) track[0][i] = i; for (let j = 0; j <= s2.length; j += 1) track[j][0] = j;
            for (let j = 1; j <= s2.length; j += 1) { for (let i = 1; i <= s1.length; i += 1) { const indicator = s1[i - 1] === s2[j - 1] ? 0 : 1; track[j][i] = Math.min(track[j][i - 1] + 1, track[j - 1][i] + 1, track[j - 1][i - 1] + indicator); } }
            return track[s2.length][s1.length];
        }
    </script>
