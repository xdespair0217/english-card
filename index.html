<style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #a0a0a0;
            --accent-again: #ff5252;
            --accent-hard: #ffd740;
            --accent-good: #40c4ff;
            --accent-easy: #69f0ae;
            --border-color: #333333;
            --score-bg: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* 關鍵修正：改用 dvh (dynamic viewport height)，動態扣除手機瀏覽器的網址列與工具列 */
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 讓上下元件依據螢幕高度自動撐開分配 */
            align-items: center;
            overflow: hidden;
            padding: 70px 16px 20px 16px; /* 為上下保留安全邊距 */
        }

        header {
            position: absolute;
            top: 20px;
            width: 100%;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .progress-container {
            flex-grow: 1;
            max-width: 240px; /* 手機版縮小進度條寬度 */
            background: #2a2a2a;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-right: 15px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-good), var(--accent-easy));
            transition: width 0.3s ease;
        }

        .counter {
            font-size: 0.8rem;
            color: var(--text-sub);
            min-width: 50px;
        }

        .status-tag {
            font-size: 0.75rem;
            color: #69f0ae;
            border: 1px solid #2a4a3a;
            padding: 4px 10px;
            border-radius: 15px;
            background: rgba(105, 240, 174, 0.05);
        }

        #learning-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            flex-grow: 1;
            justify-content: center; /* 確保在手機畫面的幾何中心 */
            gap: 15px;
            min-height: 0; /* 阻止 Flex 子元件溢出 */
        }

        .stage {
            perspective: 1000px;
            width: 100%;
            max-width: 480px; 
            /* 關鍵修正：不再寫死 730px，而是由系統依據螢幕剩餘高度動態計算，最高不超過螢幕的 65% */
            height: 62vh; 
            max-height: 650px;
            min-height: 400px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .card-front {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .card-front .word {
            /* 手機版字體微調，避免超長單字爆開 */
            font-size: clamp(2.2rem, 8vw, 3.2rem); 
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
        }

        .card-front .hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.75rem;
            color: var(--text-sub);
            letter-spacing: 1px;
        }

        .card-back {
            transform: rotateY(180deg);
            display: flex !important;
            flex-direction: column !important;
            justify-content: flex-start;
            align-items: center;
            padding: 0 !important;
        }

        .card-image-bg {
            width: 100% !important;
            aspect-ratio: 16 / 9 !important;
            opacity: 1.0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            background-color: #0d0d0d;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        /* 下方獨立滾動文字區：在手機上此區域會自動收縮，並允許內部獨立滑動 */
        .card-back-content {
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 16px 20px;
            text-align: left;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* 優化 iOS 滑動順暢度 */
        }

        .card-back-content::-webkit-scrollbar { width: 4px; }
        .card-back-content::-webkit-scrollbar-track { background: transparent; }
        .card-back-content::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

        .word-meta {
            display: flex;
            align-items: baseline;
            margin-bottom: 2px;
            flex-wrap: wrap;
        }

        .word-title {
            font-size: clamp(1.6rem, 5vw, 2rem);
            font-weight: 700;
            margin-right: 8px;
            color: #ffffff;
        }

        .word-type {
            font-style: italic;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        .translation {
            font-size: 1.15rem;
            margin-bottom: 10px;
            color: var(--accent-good);
            font-weight: 600;
        }

        .section-title {
            font-size: 0.75rem;
            color: #ffb74d;
            margin-top: 6px;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
            font-weight: bold;
        }

        .section-text {
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 4px;
            padding-left: 4px;
            white-space: pre-line;
            line-line-height: 1.4;
        }

        .example-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 4px;
        }

        .mic-btn {
            background: #252525;
            border: 1px solid #444;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            outline: none;
            flex-shrink: 0;
        }
        
        .mic-btn svg { width: 14px; height: 14px; fill: #69f0ae; }
        .mic-btn.recording { border-color: var(--accent-again); animation: pulse 1.2s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(255, 82, 82, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); }
        }

        .example-block {
            margin-top: 4px;
            border-left: 2px solid #555;
            padding-left: 10px;
            width: 100%;
        }

        .example-en { font-size: 0.9rem; color: var(--text-main); line-height: 1.4; word-break: break-word; }
        .example-ch { font-size: 0.8rem; color: var(--text-sub); margin-top: 2px; }

        .speech-feedback-panel {
            margin-top: 10px;
            background-color: var(--score-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 14px;
        }

        .feedback-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .score-display { font-size: 1.15rem; font-weight: 700; color: var(--accent-hard); }
        .score-display.perfect { color: var(--accent-easy); }
        .score-display.danger { color: var(--accent-again); }
        .feedback-label { font-size: 0.7rem; color: var(--text-sub); }
        .user-transcript-box { font-size: 0.85rem; line-height: 1.35; color: var(--text-main); margin-bottom: 4px; }

        .word-correct { color: #69f0ae; margin-right: 4px; display: inline-block; }
        .word-error { color: #ff5252; text-decoration: underline dashed #ff5252; margin-right: 4px; display: inline-block; }
        .word-missed { color: #888888; text-decoration: line-through; margin-right: 4px; display: inline-block; }
        .ai-commentary { font-size: 0.75rem; color: var(--text-sub); font-style: italic; border-top: 1px solid #2a2a2a; padding-top: 4px; margin-top: 4px; }

        .controls {
            display: flex;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            width: 100%;
            max-width: 480px;
            flex-shrink: 0;
            padding-bottom: 10px; /* 防止被手機底部虛擬條遮擋 */
        }

        .controls.visible { opacity: 1; pointer-events: auto; }

        .btn {
            flex: 1;
            background: #222;
            border: 1px solid var(--border-color);
            padding: 10px 4px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .btn .num-tag { font-size: 0.65rem; opacity: 0.3; margin-top: 2px; }
        .btn:hover { background: #2b2b2b; }
        .btn-again:hover { border-color: var(--accent-again); color: var(--accent-again); }
        .btn-hard:hover { border-color: var(--accent-hard); color: var(--accent-hard); }
        .btn-good:hover { border-color: var(--accent-good); color: var(--accent-good); }
        .btn-easy:hover { border-color: var(--accent-easy); color: var(--accent-easy); }

        .message-screen { text-align: center; max-width: 100%; padding: 0 20px; margin-top: 60px; }
        .message-screen h2 { font-size: 1.6rem; margin-bottom: 12px; }
        .message-screen p { color: var(--text-sub); font-size: 0.9rem; line-height: 1.5; }
        .hidden { display: none !important; }
        
        .reset-storage-btn {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            padding: 4px 8px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.7rem;
        }
    </style>
