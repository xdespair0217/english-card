<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 科學記憶永久宮殿 — 深度觀察者</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #a0a0a0;
            --accent-again: #ff5252;
            --accent-hard: #ffd740;
            --accent-good: #40c4ff;
            --accent-easy: #69f0ae;
            --border-color: #333333;
            --score-bg: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            overflow: hidden;
            padding: 10px 12px 20px 12px; 
        }

        /* 🌐 頂部課程切換控制區（已隱藏手動輸入框，只留下純粹的課程下拉選單） */
        .directory-zone {
            width: 100%;
            max-width: 620px;
            background: #1a1a1a;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .course-select {
            flex: 1;
            background: #252525;
            border: 1px solid #444;
            color: #ffd740;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        header {
            width: 100%;
            max-width: 620px;
            padding: 4px 4px 8px 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            flex-shrink: 0;
            border-bottom: 1px solid #222;
        }

        .progress-container {
            flex-grow: 1;
            max-width: 180px; 
            background: #2a2a2a;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-right: 12px;
        }
        @media (min-width: 768px) { .progress-container { max-width: 320px; } }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-good), var(--accent-easy));
            transition: width 0.3s ease;
        }

        .counter { font-size: 0.8rem; color: var(--text-sub); min-width: 50px; }
        .btn-group { display: flex; gap: 6px; align-items: center; }

        .action-btn {
            background: transparent;
            border: 1px solid #444;
            color: var(--text-sub);
            padding: 4px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s ease;
        }
        .action-btn:hover { color: var(--text-main); border-color: var(--text-sub); }

        /* 頂部 SRS 控制區 */
        .controls { 
            display: flex; 
            gap: 8px; 
            opacity: 0; 
            visibility: hidden;
            height: 0;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1); 
            width: 100%; 
            max-width: 620px; 
            flex-shrink: 0;
        }
        .controls.visible { 
            opacity: 1; 
            visibility: visible;
            height: 46px;
            transform: translateY(0);
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .btn { 
            flex: 1; 
            background: #222; 
            border: 1px solid var(--border-color); 
            padding: 6px 4px; 
            border-radius: 12px; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-main); 
            font-weight: 500; 
            font-size: 0.85rem; 
            transition: all 0.2s ease; 
            -webkit-tap-highlight-color: transparent; 
        }
        @media (min-width: 768px) { .btn { padding: 10px; font-size: 0.95rem; } .controls.visible { height: 56px; } }
        .btn .num-tag { font-size: 0.65rem; opacity: 0.4; margin-top: 2px; }
        .btn:hover { background: #2b2b2b; }
        .btn-again:hover { border-color: var(--accent-again); color: var(--accent-again); }
        .btn-hard:hover { border-color: var(--accent-hard); color: var(--accent-hard); }
        .btn-good:hover { border-color: var(--accent-good); color: var(--accent-good); }
        .btn-easy:hover { border-color: var(--accent-easy); color: var(--accent-easy); }

        /* 卡片舞台大空間 */
        .stage { 
            perspective: 1000px; 
            width: 100%; 
            max-width: 620px; 
            flex-grow: 1;
            cursor: pointer; 
            margin-top: 4px;
        }

        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }

        .card-front { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        .card-front .word { font-size: 2.6rem; font-weight: 700; letter-spacing: -0.5px; text-align: center; word-break: break-all; color: #ffffff; }
        .card-front .hint { position: absolute; bottom: 25px; font-size: 0.8rem; color: var(--text-sub); letter-spacing: 1px; }

        /* 右上角難易度等級標籤樣式 */
        .card-level-badge {
            position: absolute;
            top: 15px;
            right: 20px;
            background: #2a2a2a;
            color: var(--accent-good);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            border: 1px solid #444;
            letter-spacing: 0.5px;
        }

        /* ✨ 新增：卡片專屬的隨手聽重複發音小按鈕樣式 */
        .card-speaker-btn {
            background: #252525;
            border: 1px solid #444;
            color: var(--accent-easy);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }
        .card-speaker-btn:hover {
            background: #333;
            border-color: var(--accent-easy);
        }
        /* 正面大喇叭按鈕位置偏中間下方 */
        .front-speaker-box {
            margin-top: 20px;
            z-index: 15;
        }

        .card-back { transform: rotateY(180deg); display: flex !important; flex-direction: column !important; justify-content: flex-start; align-items: center; padding: 0 !important; }
        
        .card-image-bg { 
            width: 100% !important; 
            height: 25%; 
            min-height: 100px;
            opacity: 1.0; 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center; 
            pointer-events: none; 
            background-color: #0d0d0d; 
            border-bottom: 1px solid var(--border-color); 
            flex-shrink: 0; 
        }

        .card-back-content { width: 100%; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; padding: 14px 18px; text-align: left; overflow-y: auto; }

        .word-meta { display: flex; align-items: center; margin-bottom: 2px; flex-wrap: wrap; justify-content: space-between; width: 100%; }
        .meta-left { display: flex; align-items: baseline; }
        .word-title { font-size: 1.6rem; font-weight: 700; margin-right: 10px; color: #ffffff; }
        .word-type { font-style: italic; color: var(--text-sub); font-size: 0.9rem; }
        .translation { font-size: 1.1rem; margin-bottom: 8px; color: var(--accent-good); font-weight: 600; }

        .section-title { font-size: 0.75rem; color: #ffb74d; margin-top: 6px; margin-bottom: 2px; letter-spacing: 0.5px; font-weight: bold; }
        .section-text { font-size: 0.9rem; color: var(--text-main); margin-bottom: 4px; padding-left: 4px; white-space: pre-line; line-height: 1.4; }

        .example-header { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
        .mic-btn { background: #252525; border: 1px solid #444; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; outline: none; }
        .mic-btn svg { width: 14px; height: 14px; fill: #69f0ae; }
        .mic-btn.recording { border-color: var(--accent-again); animation: pulse 1.2s infinite; }
        .mic-btn.recording svg { fill: var(--accent-again); }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 82, 82, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); } }

        .example-block { margin-top: 4px; border-left: 2px solid #555; padding-left: 10px; width: 100%; }
        .example-en { font-size: 0.9rem; color: var(--text-main); line-height: 1.4; word-break: break-word; }
        .example-ch { font-size: 0.8rem; color: var(--text-sub); margin-top: 2px; }

        .speech-feedback-panel { margin-top: 10px; background-color: var(--score-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 14px; }
        .feedback-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .score-display { font-size: 1.15rem; font-weight: 700; color: var(--accent-hard); }
        .feedback-label { font-size: 0.7rem; color: var(--text-sub); letter-spacing: 0.5px; }
        .user-transcript-box { font-size: 0.85rem; line-height: 1.4; color: var(--text-main); margin-bottom: 4px; }
        .ai-commentary { font-size: 0.75rem; color: var(--text-sub); font-style: italic; border-top: 1px solid #2a2a2a; padding-top: 4px; margin-top: 4px; }

        .message-screen { text-align: center; max-width: 450px; margin-top: 60px; padding: 20px; }
        .message-screen h2 { font-size: 1.8rem; margin-bottom: 12px; font-weight: 600; }
        .message-screen p { color: var(--text-sub); font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px; }
        .file-upload-btn { background: #252525; border: 1px solid #444; color: var(--text-main); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="directory-zone">
        <span style="font-size:0.85rem; color:var(--text-sub); white-space:nowrap; font-weight:bold;">📚 當前內化課程：</span>
        <select id="course-dropdown" class="course-select" onchange="handleCourseSwitch(this.value)">
            <option value="internal_default">✨ 預設內建英文核心單字庫</option>
        </select>
    </div>

    <header>
        <div style="display: flex; align-items: center; flex-grow: 1;">
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <span class="counter" id="counter">0 / 0</span>
        </div>
        <div class="btn-group">
            <button class="action-btn" onclick="exportCurrentCourseProgress()">導出進度</button>
            <button class="action-btn" onclick="clearCurrentCourseProgress()" style="color:#ff5252;">清除進度</button>
        </div>
    </header>

    <div id="learning-stage" style="display: flex; flex-direction: column; align-items: center; width: 100%; height: calc(100vh - 150px); justify-content: flex-start;">
        
        <div class="controls" id="controls">
            <button class="btn btn-again" onclick="handleSRS('again')">Again<span class="num-tag">①</span></button>
            <button class="btn btn-hard" onclick="handleSRS('hard')">Hard<span class="num-tag">②</span></button>
            <button class="btn btn-good" onclick="handleSRS('good')">Good<span class="num-tag">③</span></button>
            <button class="btn btn-easy" onclick="handleSRS('easy')">Easy<span class="num-tag">④</span></button>
        </div>

        <div class="stage" id="card-stage" onclick="flipCard()">
            <div class="card" id="flashcard">
                <div class="card-face card-front">
                    <div class="card-level-badge" id="front-level">-</div>
                    <div class="word" id="front-word">-</div>
                    <div class="front-speaker-box">
                        <button class="card-speaker-btn" onclick="event.stopPropagation(); replayAudio();">🔊 重複聽單字</button>
                    </div>
                    <div class="hint">點擊卡片翻面</div>
                </div>
                <div class="card-face card-back">
                    <div class="card-image-bg" id="card-image"></div>
                    <div class="card-back-content" onclick="event.stopPropagation();">
                        <div class="word-meta">
                            <div class="meta-left">
                                <span class="word-title" id="back-word">-</span>
                                <span class="word-type" id="back-type">-</span>
                            </div>
                            <button class="card-speaker-btn" onclick="replayAudio();">🔊 重聽發音</button>
                        </div>
                        <div class="translation" id="back-translation">-</div>
                        
                        <div class="section-title" id="label-inflection">【詞性變化】</div>
                        <div class="section-text" id="back-inflection">-</div>
                        
                        <div class="section-title" id="label-collocation">【搭配詞】</div>
                        <div class="section-text" id="back-collocation">-</div>

                        <div class="section-title" id="label-phr" style="color:#40c4ff;">【核心片語】</div>
                        <div class="section-text" id="back-phr" style="color:#ffffff; font-weight:500;">-</div>
                        
                        <div class="example-header">
                            <div class="section-title" id="label-challenge">【例句口說挑戰】</div>
                            <button class="mic-btn" id="mic-button" title="開始口說辨識">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="example-block">
                            <div class="example-en" id="back-example-en">-</div>
                            <div class="example-ch" id="back-example-ch">-</div>
                        </div>

                        <div class="speech-feedback-panel hidden" id="feedback-panel">
                            <div class="feedback-top">
                                <span class="feedback-label">AI 分析回饋</span>
                                <span class="score-display" id="score-text">0.0 / 10分</span>
                            </div>
                            <div class="user-transcript-box" id="visual-transcript"></div>
                            <div class="ai-commentary" id="ai-comment">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div id="completion-screen" class="message-screen hidden">
        <h2>思維沉澱，破關完成</h2>
        <p>當前序列已順利完成內化。</p>
        <button class="file-upload-btn" onclick="resetEngine()">重頭學習</button>
    </div>

    <script>
        // 🔒 固定寫死你的總目錄 CSV 網址（底層自動對接機制）
        const MASTER_INDEX_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRwcq7RkVq_FVU4iYHMLTFQW_DIRkqgaSsp1dEkEp0zYxz-saj00T-IM2Km8WbT41oFrzkUUXMqQp-j/pub?output=csv";

        // 預設內建庫同步擴展為 10 欄位格式以防錯位
        const DEFAULT_INTERNAL_DATABASE = [
            { word: "ability", type: "n.", level: "A2", translation: "能力；才能", inflection: "able (adj.) 能夠的", collocation: "have the ability to", phr: "ability to do sth.", example_en: "He has the ability to look deep into the truth.", example_ch: "他有深入洞察真相的能力。", historyCount: 0 }
        ];

        let currentCourseKey = "internal_default";
        let originalCards = [];
        let queue = [];
        let currentCard = null;
        let isFlipped = false;
        let currentLangMode = "en-US"; 
        
        const synth = window.speechSynthesis;
        let recognition = null;
        let isRecording = false;

        const learningStage = document.getElementById('learning-stage');
        const completionScreen = document.getElementById('completion-screen');
        const flashcard = document.getElementById('flashcard');
        const controls = document.getElementById('controls');
        const progressBar = document.getElementById('progress-bar');
        const counter = document.getElementById('counter');

        window.addEventListener('DOMContentLoaded', () => { 
            // 頁面一載入，主動在背景連線你的總目錄
            autoFetchDirectory();

            document.getElementById('mic-button').addEventListener('click', (e) => { e.stopPropagation(); toggleRecording(); });
        });

        // 背景自動解析 Google 試算表下載格式
        function fixGoogleSpreadsheetUrl(url) {
            let clean = url.trim();
            if (clean.includes("docs.google.com/spreadsheets") && !clean.includes("output=csv") && !clean.includes("format=csv")) {
                if (clean.includes("/edit")) {
                    clean = clean.split('/edit')[0] + "/export?format=csv";
                } else if (clean.endsWith("/")) {
                    clean = clean + "export?format=csv";
                } else if (!clean.includes("/export")) {
                    clean = clean + "/export?format=csv";
                }
            }
            return clean;
        }

        // 自動化：抓取寫死在底層的總目錄表
        function autoFetchDirectory() {
            fetch(MASTER_INDEX_URL)
                .then(res => {
                    if (!res.ok) throw new Error();
                    return res.text();
                })
                .then(text => {
                    if (text.includes("<!DOCTYPE html") || text.includes("login.google.com")) {
                        throw new Error("權限問題");
                    }
                    const lines = text.replace(/\r/g, '').split('\n');
                    const dropdown = document.getElementById('course-dropdown');
                    dropdown.innerHTML = '<option value="internal_default">✨ 預設內建英文核心單字庫</option>';
                    
                    for(let i = 1; i < lines.length; i++) {
                        const line = lines[i].trim(); if(!line) continue;
                        const parts = parseCSVLine(line);
                        if(parts.length >= 2) {
                            const option = document.createElement('option');
                            option.value = fixGoogleSpreadsheetUrl(parts[1].trim()); // 自動修正子課程網址
                            option.textContent = parts[0].trim(); 
                            dropdown.appendChild(option);
                        }
                    }
                    
                    // 自動回復上一次學習的選單位置
                    const lastCourse = localStorage.getItem('observer_last_course_key');
                    if(lastCourse && dropdown.querySelector(`option[value="${lastCourse}"]`)) {
                        dropdown.value = lastCourse;
                        currentCourseKey = lastCourse;
                    }

                    initEngineWithCache();
                })
                .catch(err => {
                    console.log("自動同步目錄受阻，切換回快取數據模式。");
                    initEngineWithCache();
                });
        }

        function handleCourseSwitch(value) {
            currentCourseKey = value;
            localStorage.setItem('observer_last_course_key', value);
            initEngineWithCache();
        }

        function initEngineWithCache() {
            if(currentCourseKey === "internal_default") {
                loadCardsData(DEFAULT_INTERNAL_DATABASE, "internal_default");
            } else {
                fetch(currentCourseKey)
                    .then(res => {
                        if(!res.ok) throw new Error();
                        return res.text();
                    })
                    .then(text => {
                        if (text.includes("<!DOCTYPE html")) throw new Error();
                        const cards = parseCourseCSV(text);
                        if(cards.length === 0) throw new Error();
                        loadCardsData(cards, currentCourseKey);
                    })
                    .catch(err => {
                        alert("⚠️ 讀取該課程詳細內容失敗。\n請檢查子課程試算表的第一行(第1列)是否已經改成 10 欄位純英文(word, type, level, translation 等)，且有開啟發布到網路。");
                        handleCourseSwitch("internal_default");
                    });
            }
        }

        function loadCardsData(baseCards, storageSuffix) {
            const cacheKey_queue = `srs_queue_${btoa(storageSuffix).substring(0,20)}`;
            const cacheKey_orig = `srs_orig_${btoa(storageSuffix).substring(0,20)}`;
            const cachedQueue = localStorage.getItem(cacheKey_queue);
            const cachedOriginal = localStorage.getItem(cacheKey_orig);
            
            if (cachedQueue && cachedOriginal) {
                queue = JSON.parse(cachedQueue);
                originalCards = JSON.parse(cachedOriginal);
            } else {
                originalCards = JSON.parse(JSON.stringify(baseCards));
                queue = [...originalCards];
            }
            
            if (queue.length === 0) { showCompletion(); } 
            else {
                learningStage.classList.remove('hidden');
                completionScreen.classList.add('hidden');
                updateProgress();
                showNextCard();
            }
        }

        function detectLanguageAndAdjustUI(card) {
            const chineseRegex = /[\u4e00-\u9fa5]/;
            if (chineseRegex.test(card.example_en) || chineseRegex.test(card.word)) {
                currentLangMode = "zh-TW";
                document.getElementById('label-inflection').textContent = "【出處 / 背景】";
                document.getElementById('label-collocation').textContent = "【核心寓意】";
                document.getElementById('label-phr').textContent = "【衍生典故】";
                document.getElementById('label-challenge').textContent = "【故事與現代啟示口說挑戰】";
            } else {
                currentLangMode = "en-US";
                document.getElementById('label-inflection').textContent = "【詞性變化】";
                document.getElementById('label-collocation').textContent = "【搭配詞】";
                document.getElementById('label-phr').textContent = "【核心片語】";
                document.getElementById('label-challenge').textContent = "【例句口說挑戰】";
            }
            if(recognition) { recognition.lang = currentLangMode; }
        }

        function showNextCard() {
            if (queue.length === 0) { showCompletion(); return; }
            isFlipped = false; flashcard.classList.remove('flipped'); controls.classList.remove('visible');
            document.getElementById('feedback-panel').classList.add('hidden');
            currentCard = queue[0];
            detectLanguageAndAdjustUI(currentCard);

            // 寫入更新後的 10 欄位對應內容
            document.getElementById('front-level').textContent = currentCard.level || '-';
            document.getElementById('front-word').textContent = currentCard.word;
            document.getElementById('back-word').textContent = currentCard.word;
            document.getElementById('back-type').textContent = currentCard.type || '';
            document.getElementById('back-translation').textContent = currentCard.translation;
            document.getElementById('back-inflection').textContent = currentCard.inflection;
            document.getElementById('back-collocation').textContent = currentCard.collocation;
            document.getElementById('back-phr').textContent = currentCard.phr || '-'; 
            document.getElementById('back-example-en').textContent = currentCard.example_en;
            document.getElementById('back-example-ch').textContent = currentCard.example_ch || '';
            document.querySelector('.card-back-content').scrollTop = 0;
            updateCardImage(currentCard.word);
        }

        function flipCard() {
            if (isFlipped || !currentCard) return;
            isFlipped = true; flashcard.classList.add('flipped'); controls.classList.add('visible');
            speakCard();
        }

        // 🔊 高精密發音時機控制：杜絕任何中文混入發音
        function speakCard() {
            try {
                synth.cancel(); 
                
                // 1. 先發音主要單字
                const utterWord = new SpeechSynthesisUtterance(currentCard.word); 
                utterWord.lang = currentLangMode; 
                utterWord.rate = currentLangMode === "zh-TW" ? 1.0 : 0.9;
                synth.speak(utterWord); 

                // 2. 如果是英文模式，接著讀取【核心片語】與【生活例句】
                if (currentLangMode === "en-US") {
                    const phrText = currentCard.phr ? currentCard.phr.replace(/\\n/g, " ") : "";
                    const exText = currentCard.example_en ? currentCard.example_en.replace(/\\n/g, " ") : "";
                    
                    const combineSpeech = `${phrText}. ${exText}`;
                    if (combineSpeech.trim()) {
                        const utterBody = new SpeechSynthesisUtterance(combineSpeech);
                        utterBody.lang = "en-US";
                        utterBody.rate = 0.9; 
                        synth.speak(utterBody);
                    }
                } else {
                    const utterExample = new SpeechSynthesisUtterance(currentCard.example_en); 
                    utterExample.lang = currentLangMode; 
                    utterExample.rate = 1.0;
                    synth.speak(utterExample);
                }
            } catch(e) {}
        }

        // ✨ 供外部按鈕隨時重播的精密發音控制函數
        function replayAudio() {
            if (!currentCard) return;
            try {
                synth.cancel();
                if (!isFlipped) {
                    // 正面時：只重播單字本身
                    const utterWord = new SpeechSynthesisUtterance(currentCard.word);
                    utterWord.lang = currentLangMode;
                    utterWord.rate = currentLangMode === "zh-TW" ? 1.0 : 0.9;
                    synth.speak(utterWord);
                } else {
                    // 背面時：直接重播完整的組合音訊
                    speakCard();
                }
            } catch(e) {}
        }

        function handleSRS(level) {
            if (!isFlipped) return;
            const card = queue.shift(); 
            if (level === 'again') { card.historyCount = (card.historyCount || 0) + 1; queue.splice(1, 0, card); } 
            else if (level === 'hard') { card.historyCount = (card.historyCount || 0) + 0.5; const idx = Math.max(2, Math.floor(queue.length / 3)); queue.splice(idx, 0, card); } 
            else if (level === 'good') { card.historyCount = (card.historyCount || 0) - 0.2; const idx = Math.max(1, Math.floor(queue.length * 0.8)); queue.splice(idx, 0, card); } 
            else if (level === 'easy') {
                const master = originalCards.find(c => c.word === card.word);
                if(master) master.historyCount = 99; 
            }
            const suffix = btoa(currentCourseKey).substring(0,20);
            localStorage.setItem(`srs_queue_${suffix}`, JSON.stringify(queue));
            localStorage.setItem(`srs_orig_${suffix}`, JSON.stringify(originalCards));
            updateProgress(); showNextCard();
        }

        // 🛠️ 10 欄位精密數據映射解析核心
        function parseCourseCSV(text) {
            const lines = text.replace(/\r/g, '').split('\n');
            let importedData = [];
            for (let i = 1; i < lines.length; i++) {
                let line = lines[i].trim(); if (!line) continue;
                let row = parseCSVLine(line);
                
                if (row.length >= 8) {
                    importedData.push({
                        word:         row[0] ? row[0].trim() : '', 
                        type:         row[1] ? row[1].trim() : '', 
                        level:        row[2] ? row[2].trim() : '', 
                        translation:  row[3] ? row[3].trim() : '', 
                        inflection:   row[4] ? row[4].replace(/\\n/g, '\n') : '',
                        collocation:  row[5] ? row[5].replace(/\\n/g, '\n') : '', 
                        phr:          row[6] ? row[6].replace(/\\n/g, '\n') : '', 
                        example_en:   row[7] ? row[7].replace(/\\n/g, '\n') : '', 
                        example_ch:   row[8] ? row[8].replace(/\\n/g, '\n') : '',
                        historyCount: row[9] ? parseFloat(row[9]) : 0
                    });
                }
            }
            return importedData;
        }

        function parseCSVLine(line) {
            let row = [], inQuotes = false, currentField = '';
            for (let j = 0; j < line.length; j++) {
                let char = line[j];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { row.push(currentField.trim()); currentField = ''; }
                else currentField += char;
            }
            row.push(currentField.trim());
            return row.map(v => v.startsWith('"') && v.endsWith('"') ? v.slice(1, -1).replace(/""/g, '"') : v);
        }

        function updateProgress() {
            const total = originalCards.length; const currentLeft = queue.length;
            progressBar.style.width = `${total > 0 ? ((total - currentLeft) / total) * 100 : 0}%`;
            counter.textContent = `${currentLeft} / ${total}`;
        }
        function showCompletion() { learningStage.classList.add('hidden'); completionScreen.classList.remove('hidden'); }
        function resetEngine() { queue = originalCards.map(c => { if(c.historyCount == 99) c.historyCount = 0; return c; }); initEngineWithCache(); }
        function clearCurrentCourseProgress() { if(confirm("確定歸零清除當前課程的記憶進度？")) { const suffix = btoa(currentCourseKey).substring(0,20); localStorage.removeItem(`srs_queue_${suffix}`); localStorage.removeItem(`srs_orig_${suffix}`); initEngineWithCache(); } }
        function updateCardImage(word) { document.getElementById('card-image').style.backgroundImage = `url('./${word.toLowerCase()}.jpg')`; }
    </script>
</body>
